<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Gerador de QR Codes para mesas do Restaurante Tech - Imprima e coloque nas mesas para seus clientes fazerem pedidos.">
    <title>Restaurante Tech - QR Codes das Mesas</title>
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <!-- FontAwesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <!-- QRCode.js library -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <style>
        :root {
            --bg: #0b0f19;
            --card-bg: rgba(255,255,255,0.04);
            --card-border: rgba(255,255,255,0.09);
            --primary: #ff4757;
            --primary-glow: rgba(255, 71, 87, 0.3);
            --accent: #1e90ff;
            --accent-glow: rgba(30, 144, 255, 0.3);
            --green: #2ed573;
            --green-glow: rgba(46, 213, 115, 0.3);
            --gold: #ffa502;
            --text: #f1f2f6;
            --muted: #a4b0be;
            --radius: 20px;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: 'Outfit', sans-serif;
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
            overflow-x: hidden;
            background-image:
                radial-gradient(circle at 15% 15%, rgba(255,71,87,0.07) 0%, transparent 45%),
                radial-gradient(circle at 85% 85%, rgba(30,144,255,0.07) 0%, transparent 45%);
        }

        /* --- HEADER --- */
        .page-header {
            position: sticky;
            top: 0;
            z-index: 100;
            background: rgba(11, 15, 25, 0.85);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border-bottom: 1px solid var(--card-border);
            padding: 16px 32px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 16px;
        }

        .header-left {
            display: flex;
            align-items: center;
            gap: 14px;
        }

        .back-btn {
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 8px 16px;
            border: 1px solid var(--card-border);
            border-radius: 50px;
            background: var(--card-bg);
            color: var(--muted);
            text-decoration: none;
            font-size: 0.9rem;
            font-family: 'Outfit', sans-serif;
            cursor: pointer;
            transition: all 0.25s ease;
        }

        .back-btn:hover {
            border-color: rgba(255,255,255,0.2);
            color: var(--text);
            background: rgba(255,255,255,0.08);
        }

        .header-title {
            display: flex;
            flex-direction: column;
        }

        .header-title h1 {
            font-size: 1.4rem;
            font-weight: 700;
            background: linear-gradient(135deg, #ff4757, #ff6b81, #ffa502);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .header-title span {
            font-size: 0.8rem;
            color: var(--muted);
        }

        .header-actions {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .action-btn {
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 10px 20px;
            border: none;
            border-radius: 50px;
            font-family: 'Outfit', sans-serif;
            font-weight: 600;
            font-size: 0.9rem;
            cursor: pointer;
            transition: all 0.25s ease;
        }

        .btn-print {
            background: linear-gradient(135deg, var(--primary), #ff6b81);
            color: #fff;
            box-shadow: 0 4px 18px var(--primary-glow);
        }

        .btn-print:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 24px var(--primary-glow);
        }

        .btn-refresh {
            background: var(--card-bg);
            color: var(--muted);
            border: 1px solid var(--card-border);
        }

        .btn-refresh:hover {
            background: rgba(255,255,255,0.08);
            color: var(--text);
        }

        /* --- CONTENT --- */
        .page-content {
            max-width: 1280px;
            margin: 0 auto;
            padding: 40px 24px 60px;
        }

        .section-intro {
            text-align: center;
            margin-bottom: 44px;
        }

        .section-intro h2 {
            font-size: 2.2rem;
            font-weight: 800;
            margin-bottom: 10px;
        }

        .section-intro h2 span {
            background: linear-gradient(135deg, #2ed573, #1e90ff);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .section-intro p {
            color: var(--muted);
            font-size: 1rem;
            max-width: 520px;
            margin: 0 auto;
            line-height: 1.6;
        }

        /* --- BASE URL BAR --- */
        .base-url-bar {
            background: var(--card-bg);
            border: 1px solid var(--card-border);
            border-radius: 12px;
            padding: 14px 20px;
            margin-bottom: 36px;
            display: flex;
            align-items: center;
            gap: 12px;
            flex-wrap: wrap;
        }

        .base-url-label {
            font-size: 0.8rem;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: var(--gold);
            white-space: nowrap;
        }

        .base-url-input {
            flex: 1;
            background: rgba(255,255,255,0.06);
            border: 1px solid var(--card-border);
            border-radius: 8px;
            padding: 8px 14px;
            font-family: 'Outfit', monospace;
            font-size: 0.9rem;
            color: var(--text);
            min-width: 250px;
        }

        .base-url-input:focus {
            outline: none;
            border-color: var(--accent);
            box-shadow: 0 0 0 3px rgba(30, 144, 255, 0.15);
        }

        .btn-apply-url {
            display: flex;
            align-items: center;
            gap: 6px;
            padding: 8px 16px;
            border: none;
            border-radius: 8px;
            background: linear-gradient(135deg, var(--accent), #5b9aff);
            color: #fff;
            font-family: 'Outfit', sans-serif;
            font-weight: 600;
            font-size: 0.85rem;
            cursor: pointer;
            transition: all 0.2s;
        }

        .btn-apply-url:hover {
            transform: translateY(-1px);
            box-shadow: 0 4px 12px var(--accent-glow);
        }

        /* --- QR GRID --- */
        .qr-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(240px, 1fr));
            gap: 24px;
        }

        .qr-card {
            background: var(--card-bg);
            border: 1px solid var(--card-border);
            border-radius: var(--radius);
            padding: 28px 20px 22px;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 16px;
            transition: all 0.35s cubic-bezier(0.165, 0.84, 0.44, 1);
            position: relative;
            overflow: hidden;
            cursor: pointer;
        }

        .qr-card::before {
            content: '';
            position: absolute;
            inset: 0;
            background: linear-gradient(180deg, rgba(255,255,255,0.04) 0%, transparent 60%);
            opacity: 0;
            transition: opacity 0.35s ease;
        }

        .qr-card:hover {
            transform: translateY(-6px);
            border-color: rgba(255,255,255,0.18);
            box-shadow: 0 16px 40px rgba(0,0,0,0.5), 0 0 0 1px rgba(46, 213, 115, 0.2);
        }

        .qr-card:hover::before { opacity: 1; }

        .qr-card-accent {
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 3px;
            background: linear-gradient(90deg, var(--primary), var(--gold), var(--green));
            border-radius: var(--radius) var(--radius) 0 0;
        }

        .mesa-label {
            font-size: 0.75rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 2px;
            color: var(--muted);
        }

        .mesa-number {
            font-size: 2.8rem;
            font-weight: 800;
            line-height: 1;
            background: linear-gradient(135deg, #2ed573, #1e90ff);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .qr-code-wrapper {
            background: #fff;
            border-radius: 12px;
            padding: 12px;
            width: 160px;
            height: 160px;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 4px 20px rgba(0,0,0,0.4);
            transition: transform 0.3s ease;
        }

        .qr-card:hover .qr-code-wrapper {
            transform: scale(1.03);
        }

        .qr-code-wrapper canvas,
        .qr-code-wrapper img {
            border-radius: 4px;
            display: block;
        }

        .qr-url-text {
            font-size: 0.72rem;
            color: var(--muted);
            text-align: center;
            word-break: break-all;
            line-height: 1.4;
            max-width: 100%;
        }

        .qr-card-footer {
            display: flex;
            gap: 8px;
            width: 100%;
        }

        .btn-qr-action {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 6px;
            padding: 8px 10px;
            border: 1px solid var(--card-border);
            border-radius: 10px;
            background: rgba(255,255,255,0.04);
            color: var(--muted);
            font-family: 'Outfit', sans-serif;
            font-size: 0.78rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
            text-decoration: none;
        }

        .btn-qr-action:hover {
            background: rgba(255,255,255,0.1);
            color: var(--text);
            border-color: rgba(255,255,255,0.2);
        }

        .btn-qr-action.open {
            border-color: rgba(46, 213, 115, 0.3);
            color: var(--green);
        }

        .btn-qr-action.open:hover {
            background: rgba(46, 213, 115, 0.1);
            box-shadow: 0 0 12px var(--green-glow);
        }

        /* --- PRINT STYLES --- */
        @media print {
            body {
                background: #fff !important;
                color: #000 !important;
            }
            .page-header,
            .section-intro,
            .base-url-bar,
            .qr-card-footer,
            .qr-url-text,
            .btn-print, .btn-refresh,
            .back-btn {
                display: none !important;
            }
            .page-content {
                padding: 0 !important;
                max-width: 100% !important;
            }
            .qr-grid {
                display: grid !important;
                grid-template-columns: repeat(3, 1fr) !important;
                gap: 16px !important;
                page-break-inside: avoid;
            }
            .qr-card {
                background: #fff !important;
                border: 2px solid #000 !important;
                border-radius: 12px !important;
                page-break-inside: avoid;
                break-inside: avoid;
                color: #000 !important;
                box-shadow: none !important;
                transform: none !important;
                padding: 20px 16px 16px !important;
            }
            .qr-card::before { display: none !important; }
            .qr-card-accent { background: #000 !important; }
            .mesa-label { color: #333 !important; }
            .mesa-number {
                background: none !important;
                -webkit-background-clip: unset !important;
                -webkit-text-fill-color: #000 !important;
                color: #000 !important;
            }
            .qr-code-wrapper {
                box-shadow: none !important;
                border: 2px solid #ccc !important;
                width: 140px !important;
                height: 140px !important;
                padding: 8px !important;
            }
            .print-url {
                display: block !important;
                font-size: 0.6rem !important;
                color: #555 !important;
                text-align: center;
                word-break: break-all;
                margin-top: 6px;
            }
        }

        .print-url { display: none; }

        /* --- LOADING STATE --- */
        .loading-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(240px, 1fr));
            gap: 24px;
        }

        .skeleton-card {
            background: var(--card-bg);
            border: 1px solid var(--card-border);
            border-radius: var(--radius);
            padding: 28px 20px 22px;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 16px;
            animation: pulse 1.5s ease-in-out infinite;
        }

        @keyframes pulse {
            0%, 100% { opacity: 0.4; }
            50% { opacity: 0.8; }
        }

        .skel-line {
            height: 14px;
            width: 60%;
            background: rgba(255,255,255,0.1);
            border-radius: 6px;
        }

        .skel-num {
            height: 48px;
            width: 80px;
            background: rgba(255,255,255,0.1);
            border-radius: 8px;
        }

        .skel-qr {
            width: 160px;
            height: 160px;
            background: rgba(255,255,255,0.08);
            border-radius: 12px;
        }

        /* --- TOAST --- */
        .toast {
            position: fixed;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%) translateY(20px);
            background: rgba(46, 213, 115, 0.95);
            color: #fff;
            padding: 12px 24px;
            border-radius: 50px;
            font-weight: 600;
            font-size: 0.9rem;
            opacity: 0;
            pointer-events: none;
            transition: all 0.3s cubic-bezier(0.165, 0.84, 0.44, 1);
            z-index: 9999;
            white-space: nowrap;
        }

        .toast.show {
            opacity: 1;
            transform: translateX(-50%) translateY(0);
        }

        /* --- RESPONSIVE --- */
        @media (max-width: 600px) {
            .page-header { padding: 12px 16px; flex-wrap: wrap; }
            .header-title h1 { font-size: 1.1rem; }
            .section-intro h2 { font-size: 1.6rem; }
            .action-btn span { display: none; }
            .qr-grid { grid-template-columns: repeat(auto-fill, minmax(180px, 1fr)); gap: 16px; }
        }
    </style>
</head>
<body>

    <!-- STICKY HEADER -->
    <header class="page-header">
        <div class="header-left">
            <a href="/" class="back-btn" id="btn-back-hub">
                <i class="fa-solid fa-chevron-left"></i> Hub
            </a>
            <div class="header-title">
                <h1>📲 QR Codes das Mesas</h1>
                <span>Gerenciador de acesso via QR Code para clientes</span>
            </div>
        </div>
        <div class="header-actions">
            <button class="action-btn btn-refresh" id="btn-refresh-qr" title="Recarregar QR Codes">
                <i class="fa-solid fa-arrows-rotate"></i>
                <span>Recarregar</span>
            </button>
            <button class="action-btn btn-print" id="btn-print-all" title="Imprimir todos os QR Codes">
                <i class="fa-solid fa-print"></i>
                <span>Imprimir Todos</span>
            </button>
        </div>
    </header>

    <!-- MAIN CONTENT -->
    <main class="page-content">

        <div class="section-intro">
            <h2>Mesas do <span>Restaurante</span></h2>
            <p>Cada QR Code leva o cliente diretamente ao cardápio digital daquela mesa. Imprima, plastifique e coloque nas mesas!</p>
        </div>

        <!-- BASE URL CONFIG -->
        <div class="base-url-bar" id="base-url-bar">
            <span class="base-url-label"><i class="fa-solid fa-link"></i> URL Base</span>
            <input type="text" class="base-url-input" id="base-url-input" placeholder="http://localhost:8000">
            <button class="btn-apply-url" id="btn-apply-url">
                <i class="fa-solid fa-check"></i> Aplicar
            </button>
        </div>

        <!-- QR CODE GRID (dynamically populated) -->
        <div class="qr-grid" id="qr-grid">
            <!-- Skeleton loaders -->
            <div class="skeleton-card">
                <div class="skel-line"></div>
                <div class="skel-num"></div>
                <div class="skel-qr"></div>
                <div class="skel-line"></div>
            </div>
            <div class="skeleton-card">
                <div class="skel-line"></div>
                <div class="skel-num"></div>
                <div class="skel-qr"></div>
                <div class="skel-line"></div>
            </div>
            <div class="skeleton-card">
                <div class="skel-line"></div>
                <div class="skel-num"></div>
                <div class="skel-qr"></div>
                <div class="skel-line"></div>
            </div>
        </div>

    </main>

    <!-- COPY TOAST -->
    <div class="toast" id="toast">🔗 Link copiado!</div>

    <script>
    document.addEventListener('DOMContentLoaded', () => {
        let baseUrl = window.location.origin;
        let tableCount = 10;

        const qrGrid = document.getElementById('qr-grid');
        const baseUrlInput = document.getElementById('base-url-input');
        const btnApplyUrl = document.getElementById('btn-apply-url');
        const btnPrint = document.getElementById('btn-print-all');
        const btnRefresh = document.getElementById('btn-refresh-qr');
        const toast = document.getElementById('toast');

        // Set initial URL
        baseUrlInput.value = baseUrl;

        // --- INIT ---
        function init() {
            loadTables();
        }

        // Fetch actual tables from API
        async function loadTables() {
            try {
                const res = await fetch('/api/mesas');
                if (res.ok) {
                    const tables = await res.json();
                    tableCount = tables.length;
                    renderQRCodes(tables.map(t => t.number));
                } else {
                    renderQRCodes(Array.from({length: 10}, (_, i) => i + 1));
                }
            } catch {
                renderQRCodes(Array.from({length: 10}, (_, i) => i + 1));
            }
        }

        // --- RENDER ALL QR CARDS ---
        function renderQRCodes(tableNumbers) {
            qrGrid.innerHTML = '';

            tableNumbers.forEach(num => {
                const url = buildUrl(num);
                const card = createQRCard(num, url);
                qrGrid.appendChild(card);
            });
        }

        function buildUrl(mesaNum) {
            return `${baseUrl.trim().replace(/\/$/, '')}/client/index.html?mesa=${mesaNum}`;
        }

        // --- CREATE SINGLE QR CARD ---
        function createQRCard(mesaNum, url) {
            const card = document.createElement('div');
            card.className = 'qr-card';
            card.id = `qr-card-${mesaNum}`;

            const padded = String(mesaNum).padStart(2, '0');

            card.innerHTML = `
                <div class="qr-card-accent"></div>
                <span class="mesa-label">Mesa</span>
                <span class="mesa-number">${padded}</span>
                <div class="qr-code-wrapper" id="qr-canvas-${mesaNum}"></div>
                <span class="qr-url-text">${url}</span>
                <span class="print-url">${url}</span>
                <div class="qr-card-footer">
                    <button class="btn-qr-action" id="btn-copy-${mesaNum}" data-url="${url}" title="Copiar link da mesa">
                        <i class="fa-regular fa-copy"></i> Copiar Link
                    </button>
                    <a class="btn-qr-action open" href="${url}" target="_blank" rel="noopener" id="btn-open-${mesaNum}" title="Abrir cardápio da mesa">
                        <i class="fa-solid fa-arrow-up-right-from-square"></i> Abrir
                    </a>
                </div>
            `;

            // Generate QR code into wrapper
            const qrWrapper = card.querySelector(`#qr-canvas-${mesaNum}`);
            new QRCode(qrWrapper, {
                text: url,
                width: 136,
                height: 136,
                colorDark: '#0b0f19',
                colorLight: '#ffffff',
                correctLevel: QRCode.CorrectLevel.H
            });

            // Copy link button
            const copyBtn = card.querySelector(`#btn-copy-${mesaNum}`);
            copyBtn.addEventListener('click', (e) => {
                e.stopPropagation();
                copyToClipboard(url);
            });

            return card;
        }

        // --- COPY TO CLIPBOARD ---
        function copyToClipboard(text) {
            navigator.clipboard.writeText(text).then(() => {
                showToast('🔗 Link copiado!');
            }).catch(() => {
                // Fallback
                const tempEl = document.createElement('textarea');
                tempEl.value = text;
                document.body.appendChild(tempEl);
                tempEl.select();
                document.execCommand('copy');
                document.body.removeChild(tempEl);
                showToast('🔗 Link copiado!');
            });
        }

        // --- TOAST ---
        let toastTimer;
        function showToast(msg) {
            toast.textContent = msg;
            toast.classList.add('show');
            clearTimeout(toastTimer);
            toastTimer = setTimeout(() => toast.classList.remove('show'), 2500);
        }

        // --- EVENT LISTENERS ---
        btnApplyUrl.addEventListener('click', () => {
            baseUrl = baseUrlInput.value.trim() || window.location.origin;
            loadTables();
            showToast('✅ URL base atualizada!');
        });

        baseUrlInput.addEventListener('keydown', (e) => {
            if (e.key === 'Enter') btnApplyUrl.click();
        });

        btnPrint.addEventListener('click', () => {
            window.print();
        });

        btnRefresh.addEventListener('click', () => {
            qrGrid.innerHTML = `
                <div class="skeleton-card">
                    <div class="skel-line"></div>
                    <div class="skel-num"></div>
                    <div class="skel-qr"></div>
                    <div class="skel-line"></div>
                </div>
                <div class="skeleton-card">
                    <div class="skel-line"></div>
                    <div class="skel-num"></div>
                    <div class="skel-qr"></div>
                    <div class="skel-line"></div>
                </div>
                <div class="skeleton-card">
                    <div class="skel-line"></div>
                    <div class="skel-num"></div>
                    <div class="skel-qr"></div>
                    <div class="skel-line"></div>
                </div>
            `;
            setTimeout(loadTables, 300);
        });

        init();
    });
    </script>

</body>
</html>
